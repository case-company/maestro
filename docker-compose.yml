version: "3.8"

services:
  maestro:
    image: maestro:latest
    env_file:
      - .env
    volumes:
      - maestro_data:/data
      - maestro_claude:/root/.claude
      - maestro_logs:/var/log/maestro
    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.maestro.rule=Host(`maestro.manager01.casein.com.br`)"
        - "traefik.http.routers.maestro.entrypoints=websecure"
        - "traefik.http.routers.maestro.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.maestro.loadbalancer.server.port=4300"
        - "traefik.http.services.maestro.loadbalancer.passHostHeader=true"

volumes:
  maestro_data:
    driver: local
  maestro_claude:
    driver: local
  maestro_logs:
    driver: local

networks:
  network_public:
    external: true
